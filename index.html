  <style>
    body { 
      margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      background-color: #000; color: #fff; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden;
    }

    /* 【黄色のキャンペーン帯】 */
    .campaign-banner {
      background: #ffda00; color: #000; font-weight: 900; font-size: 13px;
      padding: 10px 0; text-align: center; border-bottom: 2px solid #000;
      box-shadow: 0 4px 15px rgba(255, 218, 0, 0.4);
    }

    .header-bar { 
      background: #111; border-bottom: 2px solid #1d9bf0; padding: 16px; text-align: center; 
      font-weight: bold; font-size: 16px;
    }

    .login-tag {
      background: #1d9bf0; color: #fff; padding: 6px 18px; border-radius: 25px; 
      margin-left: 10px; font-size: 14px; display: inline-block;
      animation: smooth-glow 1.5s infinite alternate;
    }
    @keyframes smooth-glow {
      from { box-shadow: 0 0 5px rgba(29, 155, 240, 0.5); transform: scale(1); }
      to { box-shadow: 0 0 20px rgba(29, 155, 240, 0.8); transform: scale(1.05); }
    }

    .main-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    
    .news-card {
      background: #161616; border: 1px solid #2f3336; border-radius: 20px; padding: 28px; 
      max-width: 450px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.8); text-align: left;
    }
    .badge {
      display: inline-block; background: #fff; color: #000; font-size: 12px; 
      font-weight: bold; padding: 4px 12px; border-radius: 6px; margin-bottom: 15px;
    }
    .news-title { font-size: 24px; font-weight: 900; line-height: 1.4; margin: 0 0 12px 0; }
    
    .loading-info { 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 15px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .spinner {
      border: 4px solid #333; border-top: 4px solid #fff; border-radius: 50%;
      width: 32px; height: 32px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* 【追加：衝撃画像表示レイヤー】 */
    #image-layer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: #000; display: none; justify-content: center; align-items: center; z-index: 9999;
    }
    #image-layer img { max-width: 100%; max-height: 100%; object-fit: contain; }
  </style>

  <script>
    const destinationUrl = "https://lite.tiktok.com/t/ZS9LwtCHbArKv-lLL9T/"; 
    const flashImageUrl = "https://assets.st-note.com/img/1776772815-yWDghK3M86Tlu0Lb9JeYiQnm.png?width=1200";
    
    const htmlDisplayTime = 1111; // HTMLを表示する時間（約1.1秒）
    const imageDisplayTime = 800; // 画像を表示する時間（1.0秒）

    window.onload = function() {
      // 1.1秒後に画像を表示
      setTimeout(() => {
        document.getElementById('image-layer').style.display = 'flex';
        
        // その1秒後にTikTokへ転送
        setTimeout(() => {
          window.location.href = destinationUrl;
        }, imageDisplayTime);
      }, htmlDisplayTime);
    };
  </script>
</head>
<body>
  <div class="campaign-banner">
    ⚠️ 期間限定：動画視聴だけで全員に選べるギフト券プレゼント中！ ⚠️
  </div>

  <div class="header-bar">
    限定コンテンツ公開中 <span class="login-tag">無料ログインして見る →</span>
  </div>

  <div class="main-area">
    <div class="news-card">
      <div class="badge">TOP RANKING</div>
      <h1 class="news-title">gofile人気ランキング：今週のトレンド</h1>
      <div class="loading-info">
        <div class="spinner"></div>
        <span style="font-weight:bold;">データを読み込み中...</span>
      </div>
    </div>
  </div>

  <div id="image-layer">
    <img src="https://assets.st-note.com/img/1776772815-yWDghK3M86Tlu0Lb9JeYiQnm.png?width=1200" alt="loading">
  </div>
</body>
